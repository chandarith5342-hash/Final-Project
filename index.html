<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rith Gaming</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
 <div class="loading" id="loading">
    <div class="loader"></div>
  </div>

  <!-- Background Effects -->
  <div class="bg-animation"></div>
  <div class="particles" id="particles"></div>

  <!-- Header -->
  <header>
    <div class="logo">⚡ RITH GAMING</div>
    <button class="cart-btn" onclick="viewCart()">
      🛒 Cart
      <span class="cart-count" id="cart-count" style="display: none;">0</span>
    </button>
  </header>

  <!-- Main Content -->
  <div class="container">
    <!-- Search -->
    <div class="search-container">
      <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search epic gear..." onkeyup="searchProduct()">
        <span class="search-icon">🔍</span>
      </div>
    </div>

    <!-- Products Grid -->
    <section class="products" id="products">
      <div class="product" data-name="aula sc580 mouse">
        <div class="product-image">
          <img src="https://gearstudiokh.com/web/image/product.product/1012/image_1024/Aula%20SC580%20Wireless%20Gaming%20Mouse%20%28Black%29?unique=e355b12" alt="Aula SC580">
        </div>
        <div class="product-info">
          <h3>Aula SC580</h3>
          <div class="product-price">$15.00</div>
          <button class="add-btn" onclick="addToCart('Aula SC580 Mouse', 15)">Add to Cart</button>
        </div>
      </div>

      <div class="product" data-name="aula s602 headphones">
        <div class="product-image">
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTzMNZ9FzHE9Bz4A7mCYYUITC8Wrb433F75Ag&s" alt="AULA S602">
          
        </div>
        <div class="product-info">
          <h3>AULA S602 Headphones</h3>
          <div class="product-price">$50.00</div>
          <button class="add-btn" onclick="addToCart('AULA S602 Headphones', 50)">Add to Cart</button>
        </div>
      </div>

      <div class="product" data-name="aula f3033 keyboard">
        <div class="product-image">
          <img src="https://www.aulastar.com/uploads/allimg/20231018/1-23101P95I1I7.jpg" alt="AULA F3033">
        </div>
        <div class="product-info">
          <h3>AULA F3033 Keyboard</h3>
          <div class="product-price">$100.00</div>
          <button class="add-btn" onclick="addToCart('AULA F3033 Keyboard', 100)">Add to Cart</button>
        </div>
      </div>

      <div class="product" data-name="gaming chair gc003">
        <div class="product-image">
          <img src="https://workspace.com.pk/wp-content/uploads/2023/03/gaming-chair-post-07-700x700-1.jpg" alt="Gaming Chair">
        
        </div>
        <div class="product-info">
          <h3>Gaming Chair GC003</h3>
          <div class="product-price">$200.00</div>
          <button class="add-btn" onclick="addToCart('Gaming Chair GC003', 200)">Add to Cart</button>
        </div>
      </div>

      <div class="product" data-name="custom controller playstation xbox">
        <div class="product-image">
          <img src="https://us.aimcontrollers.com/wp-content/uploads/2022/09/ps5-900px.jpg" alt="Custom Controller">
        </div>
        <div class="product-info">
          <h3>Custom Controllers</h3>
          <div class="product-price">$140.00</div>
          <button class="add-btn" onclick="addToCart('Custom Controller', 140)">Add to Cart</button>
        </div>
      </div>

      <div class="product" data-name="asus webcam pro">
        <div class="product-image">
          <img src="https://m.media-amazon.com/images/I/71zBQ2emtyL.jpg" alt="Asus Webcam">
        </div>
        <div class="product-info">
          <h3>Asus Webcam Pro</h3>
          <div class="product-price">$67.00</div>
          <button class="add-btn" onclick="addToCart('Asus Webcam Pro', 67)">Add to Cart</button>
        </div>
      </div>
    </section>
  </div>

  <!-- Cart Overlay -->
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <!-- Cart Sidebar -->
  <section class="cart" id="cart">
    <div class="cart-header">
      <h2>Your Cart</h2>
      <button class="close-cart" onclick="closeCart()">✕</button>
    </div>
    
    <ul id="cart-items"></ul>
    
    <div class="empty-cart" id="emptyCart" style="display: none;">
      <div class="empty-cart-icon">🎮</div>
      <p>Your cart is empty</p>
    </div>
    
    <div class="cart-footer" id="cartFooter" style="display: none;">
      <div class="total-section">
        <span>Total:</span>
        <span class="total-amount" id="total">$0.00</span>
      </div>
      <button class="checkout-btn">Checkout Now ⚡</button>
    </div>
  </section>

  <!-- Toast Notification -->
  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <div class="toast-content">
      <h4>Added to Cart!</h4>
      <p id="toastMessage">Item added successfully</p>
    </div>
  </div>

<script src="style..js"></script>
</body>
</html>
